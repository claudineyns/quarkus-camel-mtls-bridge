name: release

on:
  push:
    tags: ['v*.*.*']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.actor }}/mtls-bridge

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: mvn --batch-mode clean package -DskipTests

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.SECRET_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Gera tag "1.2.3" e "1.2" a partir da git tag "v1.2.3"
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          # Annotations lidas pelo GitHub Container Registry a partir do manifest OCI.
          # org.opencontainers.image.source    — adicionado automaticamente com a URL do repositório
          # org.opencontainers.image.created   — adicionado automaticamente com o timestamp do build
          # org.opencontainers.image.revision  — adicionado automaticamente com o SHA do commit
          labels: |
            org.opencontainers.image.title=mtls-bridge
            org.opencontainers.image.description=MTLS bridge middleware — Secure communication bridge for microservices
            org.opencontainers.image.licenses=MIT

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile.github
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: |
            index:org.opencontainers.image.title=mTLS Bridge
            index:org.opencontainers.image.description=MTLS bridge middleware — Secure communication bridge for microservices
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            REVISION=${{ github.sha }}
